name: NRC Two Bots

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bot: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run bot
        run: python bot.py
        env:
          BOT_ID: ${{ matrix.bot }}
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot${{ matrix.bot }}-screenshots
          path: "*.png"